name: MarkdownEditor
options:
  bundleIdPrefix: com.md
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0
  DownGFM:
    url: https://github.com/stackotter/Down-gfm
    branch: main
  Textual:
    url: https://github.com/gonzalezreal/textual
    from: 0.3.1

targets:
  MarkdownEditor:
    type: application
    platform: macOS
    sources:
      - MarkdownEditor
    dependencies:
      - package: Sparkle
        product: Sparkle
      - package: DownGFM
        product: Down
      - package: Textual
        product: Textual
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.md.MarkdownEditor
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "3"
        CODE_SIGN_ENTITLEMENTS: MarkdownEditor/MarkdownEditor.entitlements
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Markdown
        INFOPLIST_KEY_CFBundleDisplayName: Markdown
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_SUFeedURL: https://raw.githubusercontent.com/fightingentropy/markdown/main/appcast.xml
        INFOPLIST_KEY_SUPublicEDKey: qk1d4lmZRxr+pXMwftRYWK7yyjARhSaqWyw024Cjycc=
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: MarkdownEditor/Info.plist
      properties:
        SUFeedURL: https://raw.githubusercontent.com/fightingentropy/markdown/main/appcast.xml
        SUPublicEDKey: qk1d4lmZRxr+pXMwftRYWK7yyjARhSaqWyw024Cjycc=
        CFBundleDocumentTypes:
          - CFBundleTypeExtensions:
              - md
              - markdown
              - mdown
              - txt
            CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Editor
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeConformsTo:
              - public.plain-text
            UTTypeDescription: Markdown Document
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
  MarkdownEditorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - MarkdownEditorTests
    dependencies:
      - target: MarkdownEditor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.md.MarkdownEditorTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Markdown.app/Contents/MacOS/Markdown"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  MarkdownEditor:
    build:
      targets:
        MarkdownEditor: all
        MarkdownEditorTests: [test]
    test:
      targets:
        - name: MarkdownEditorTests

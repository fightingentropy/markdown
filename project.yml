name: MarkdownEditor
options:
  bundleIdPrefix: com.md
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0

targets:
  MarkdownEditor:
    type: application
    platform: macOS
    sources:
      - MarkdownEditor
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.md.MarkdownEditor
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "2"
        CODE_SIGN_ENTITLEMENTS: MarkdownEditor/MarkdownEditor.entitlements
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Markdown
        INFOPLIST_KEY_CFBundleDisplayName: Markdown
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_SUFeedURL: https://raw.githubusercontent.com/fightingentropy/markdown/codex/publish/appcast.xml
        INFOPLIST_KEY_SUPublicEDKey: qk1d4lmZRxr+pXMwftRYWK7yyjARhSaqWyw024Cjycc=
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: MarkdownEditor/Info.plist
      properties:
        SUFeedURL: https://raw.githubusercontent.com/fightingentropy/markdown/codex/publish/appcast.xml
        SUPublicEDKey: qk1d4lmZRxr+pXMwftRYWK7yyjARhSaqWyw024Cjycc=
        CFBundleDocumentTypes:
          - CFBundleTypeExtensions:
              - md
              - markdown
              - mdown
              - txt
            CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Editor
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeConformsTo:
              - public.plain-text
            UTTypeDescription: Markdown Document
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
